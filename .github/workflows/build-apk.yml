name: Build APK
on:
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform (android, ios, all)'
        default: 'android'
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
      - run: eas build --platform ${{ github.event.inputs.platform }} --profile preview --non-interactive
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ vars.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
          EXPO_PUBLIC_API_URL: ${{ vars.EXPO_PUBLIC_API_URL }}
          EAS_SKIP_AUTO_FINGERPRINT: 1
      - uses: actions/upload-artifact@v4
        with:
          name: geocaliza-apk
          path: ./*.apk
