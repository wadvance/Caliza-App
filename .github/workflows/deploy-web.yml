name: Deploy Web to GitHub Pages

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Deploy Firestore rules
        run: |
          npm install -g firebase-tools
          firebase deploy --only firestore:rules --project calizaapp --token "${{ secrets.FIREBASE_TOKEN }}"

      - name: Clean dist
        run: rm -rf dist

      - name: Build web
        run: npx expo export --platform web
        env:
          EXPO_PUBLIC_FIREBASE_API_KEY: ${{ secrets.EXPO_PUBLIC_FIREBASE_API_KEY }}
          EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN }}
          EXPO_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_PROJECT_ID }}
          EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET }}
          EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
          EXPO_PUBLIC_FIREBASE_APP_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_APP_ID }}
          EXPO_PUBLIC_API_URL: ${{ secrets.EXPO_PUBLIC_API_URL }}

      - name: Fix asset paths for gh-pages
        run: |
          cd dist
          sed -i 's|"/_expo/|"/Caliza-App/_expo/|g' index.html
          sed -i 's|"/assets/|"/Caliza-App/assets/|g' index.html
          find . -name '*.js' -exec sed -i 's|"/_expo/|"/Caliza-App/_expo/|g' {} +
          find . -name '*.js' -exec sed -i 's|"/assets/|"/Caliza-App/assets/|g' {} +
          # Cache busting meta
          sed -i 's|<head>|<head>\n  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">\n  <meta http-equiv="Pragma" content="no-cache">\n  <meta http-equiv="Expires" content="0">|' index.html
          # PWA manifest
          printf '{"name":"GeoCaliza","short_name":"GeoCaliza","description":"Exploraci\\u00f3n inteligente de recursos calc\\u00e1reos","start_url":"/Caliza-App/","scope":"/Caliza-App/","display":"standalone","orientation":"portrait","theme_color":"#0f0f23","background_color":"#0f0f23","lang":"es","icons":[{"src":"/Caliza-App/icons/icon-192x192.png","sizes":"192x192","type":"image/png"},{"src":"/Caliza-App/icons/icon-512x512.png","sizes":"512x512","type":"image/png"}]}' > manifest.json
          # Service worker
          printf 'self.addEventListener("fetch",function(e){e.respondWith(fetch(e.request).catch(function(){return new Response("Offline",{status:503})}))});self.addEventListener("install",function(e){e.waitUntil(self.skipWaiting())});self.addEventListener("activate",function(e){e.waitUntil(self.clients.claim())});' > sw.js
          sed -i 's|</head>|  <link rel="manifest" href="/Caliza-App/manifest.json">\n  <meta name="apple-mobile-web-app-capable" content="yes">\n  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">\n  <meta name="apple-mobile-web-app-title" content="GeoCaliza">\n</head>|' index.html
          sed -i 's|</body>|<script>if("serviceWorker" in navigator){window.addEventListener("load",function(){navigator.serviceWorker.register("/Caliza-App/sw.js")})}</script>\n</body>|' index.html
          mkdir -p icons
          cp ../src/assets/icon-192x192.png icons/
          cp ../src/assets/icon-512x512.png icons/
          touch .nojekyll

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true