name: Deploy Web to GitHub Pages

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Export web
        run: npx expo export --platform web
        env:
          EXPO_PUBLIC_SUPABASE_URL: https://scpmyuvcqsjfcrehwzsl.supabase.co
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
          EXPO_PUBLIC_API_URL: https://wadvance.github.io/Caliza-App/

      - name: Fix asset paths for gh-pages
        run: |
          cd dist
          sed -i 's|"/_expo/|"/Caliza-App/_expo/|g' index.html
          sed -i 's|"/assets/|"/Caliza-App/assets/|g' index.html
          sed -i 's|"/assets/|"/Caliza-App/assets/|g' *.js 2>/dev/null || true
          touch .nojekyll

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true
