name: Deploy Web to GitHub Pages

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Export web
        run: npx expo export --platform web
        env:
          EXPO_PUBLIC_SUPABASE_URL: https://scpmyuvcqsjfcrehwzsl.supabase.co
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
          EXPO_PUBLIC_API_URL: https://wadvance.github.io/Caliza-App/

      - name: Fix asset paths and cache-bust for gh-pages
        run: |
          cd dist
          sed -i 's|"/_expo/|"/Caliza-App/_expo/|g' index.html
          sed -i 's|"/assets/|"/Caliza-App/assets/|g' index.html
          find . -name '*.js' -exec sed -i 's|"/_expo/|"/Caliza-App/_expo/|g' {} +
          find . -name '*.js' -exec sed -i 's|"/assets/|"/Caliza-App/assets/|g' {} +
          # Add cache-busting meta tags
          sed -i 's|<title>GeoCaliza</title>|<title>GeoCaliza</title>\n    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">\n    <meta http-equiv="Pragma" content="no-cache">\n    <meta http-equiv="Expires" content="0">|' index.html
          # Add version param to script src for cache busting
          BUILD_TS=$(date +%s)
          sed -i "s|<script src=\"/Caliza-App/_expo/static/js/web/index-\([^.]*\)\.js\"|<script src=\"/Caliza-App/_expo/static/js/web/index-\1.js?v=$BUILD_TS\"|" index.html
          touch .nojekyll

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true
