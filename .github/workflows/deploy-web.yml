name: Deploy Web to GitHub Pages

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build web
        run: npx expo export --platform web
        env:
          EXPO_PUBLIC_FIREBASE_API_KEY: ${{ secrets.EXPO_PUBLIC_FIREBASE_API_KEY }}
          EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN }}
          EXPO_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_PROJECT_ID }}
          EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET }}
          EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
          EXPO_PUBLIC_FIREBASE_APP_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_APP_ID }}
          EXPO_PUBLIC_API_URL: ${{ secrets.EXPO_PUBLIC_API_URL }}

      - name: Fix asset paths for gh-pages
        run: |
          cd dist
          sed -i 's|"/_expo/|"/Caliza-App/_expo/|g' index.html
          sed -i 's|"/assets/|"/Caliza-App/assets/|g' index.html
          find . -name '*.js' -exec sed -i 's|"/_expo/|"/Caliza-App/_expo/|g' {} +
          find . -name '*.js' -exec sed -i 's|"/assets/|"/Caliza-App/assets/|g' {} +
          # Cache busting
          BUILD_DATE=$(date +%Y%m%d-%H%M%S)
          sed -i 's|<title>GeoCaliza</title>|<title>GeoCaliza</title>\n    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">\n    <meta http-equiv="Pragma" content="no-cache">\n    <meta http-equiv="Expires" content="0">\n    <script>!function(){var e="caliza_ver";try{var t='"'$BUILD_DATE'"',n=localStorage.getItem(e);n!==t&&(localStorage.setItem(e,t),window.location.search?(window.location.search+="&_cb="+t):window.location.search="?_cb="+t)}catch(e){}}();<\/script>|' index.html
          sed -i "s|<script src=\"/Caliza-App/_expo/static/js/web/index-\([^.]*\)\.js\"|<script src=\"/Caliza-App/_expo/static/js/web/index-\1.js?v=$BUILD_DATE\"|" index.html
          touch .nojekyll

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true