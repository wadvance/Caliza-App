version: '3.9'

services:
  api:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./ml/models:/app/ml_models
      - uploads:/app/uploads
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  db:
    image: postgis/postgis:16-3.4
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: caliza_explorer
      POSTGRES_USER: caliza
      POSTGRES_PASSWORD: ${DB_PASSWORD:-caliza_secret_2026}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U caliza"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  minio:
    image: minio/minio
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    environment:
      MINIO_ROOT_USER: ${MINIO_USER:-caliza}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD:-minio_secret_2026}
    command: server /data --console-address ":9001"

volumes:
  postgres_data:
  minio_data:
  uploads:
